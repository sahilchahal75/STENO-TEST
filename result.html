<!DOCTYPE html>
<html>
<head>
  <title>Detail Result</title>

  <style>
    body { font-family: Arial; padding: 15px; background:#f2f2f2; }
    h2 { text-align:center; }

    #box {
      background:white;
      padding:15px;
      border-radius:10px;
    }

    .correct { color: green; }
    .wrong { color: red; }
    .extra { color: blue; }
    .missing { color: black; font-weight:bold; }

    .formula {
      margin-top:20px;
      background:#fff;
      padding:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h2>Detail Result</h2>

<div id="box">
  <div id="summary"></div>
  <hr>
  <div id="words"></div>
</div>

<div class="formula">
  <b>Formula:</b><br>
  Total Error = Full Mistake + (Half Mistake × 0.5)<br>
  Error % = (Total Error ÷ Total Words) × 100<br>
  Qualify = Error % ≤ 8%
</div>

<div class="formula">
  <b>Colour Meaning:</b><br><br>
  <span style="color:green;">Green</span> → Correct<br>
  <span style="color:red;">Red</span> → Wrong<br>
  <span style="color:blue;">Blue</span> → Extra<br>
  <span style="color:black;">Black</span> → Missing
</div>

<script>

function normalize(word){
  return word.replace(/[.,]/g,"");
}

let ignoreMap = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs",
  "vs":"versus","v/s":"versus",
  "hon":"honourable","honourable":"hon"
};

let original = localStorage.getItem("original") || "";
let typed = localStorage.getItem("typed") || "";

let o = original.trim().split(/\s+/);
let t = typed.trim().split(/\s+/);

let i=0, j=0;
let full=0, half=0;

let output="";

while(i < o.length && j < t.length){

  let ow = normalize(o[i]).toLowerCase();
  let tw = normalize(t[j]).toLowerCase();

  // correct
  if(ow === tw){
    output += "<span class='correct'>" + t[j] + "</span> ";
    i++; j++;
    continue;
  }

  // ignore
  if(ignoreMap[ow] === tw || ignoreMap[tw] === ow){
    output += "<span class='correct'>" + t[j] + "</span> ";
    i++; j++;
    continue;
  }

  // SHIFT FIX
  if(o[i+1] && normalize(o[i+1]).toLowerCase() === tw){
    output += "<span class='missing'>[Missing: " + o[i] + "]</span> ";
    full++;
    i++;
    continue;
  }

  if(t[j+1] && normalize(t[j+1]).toLowerCase() === ow){
    output += "<span class='extra'>" + t[j] + "</span> ";
    full++;
    j++;
    continue;
  }

  // singular/plural
  if(ow+"s" === tw || ow === tw+"s"){
    output += "<span class='wrong'>" + t[j] + "</span> ";
    half++;
    i++; j++;
    continue;
  }

  // wrong
  output += "<span class='wrong'>" + t[j] + "</span> ";
  full++;
  i++; j++;
}

// remaining
while(i < o.length){
  output += "<span class='missing'>[Missing: " + o[i] + "]</span> ";
  full++;
  i++;
}

while(j < t.length){
  output += "<span class='extra'>" + t[j] + "</span> ";
  full++;
  j++;
}

let totalError = full + (half * 0.5);
let errorPercent = ((totalError / o.length) * 100).toFixed(2);

let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

// summary
document.getElementById("summary").innerHTML =
  "<b>Total Words:</b> " + o.length +
  "<br><b>Full Mistake:</b> " + full +
  "<br><b>Half Mistake:</b> " + half +
  "<br><b>Total Error:</b> " + totalError +
  "<br><b>Error %:</b> " + errorPercent +
  "<br><br><b>Status:</b> " + status;

// output
document.getElementById("words").innerHTML = output;

</script>

</body>
</html>
