<!DOCTYPE html>
<html>
<head>
  <title>Detail Result</title>

  <style>
    body { font-family: Arial; padding: 15px; background:#f2f2f2; }

    h2 { text-align:center; }

    #box {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-top:10px;
    }

    .correct { color: green; }
    .wrong { color: red; }
    .extra { color: blue; }
    .missing { color: black; font-weight:bold; }

    .formula {
      margin-top:20px;
      background:#fff;
      padding:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h2>Detail Result</h2>

<div id="box">
  <div id="summary"></div>
  <hr>
  <div id="words"></div>
</div>

<!-- Formula -->
<div class="formula">
  <b>Formula:</b><br>
  Total Error = Full Mistake + (Half Mistake × 0.5)<br>
  Error % = (Total Error ÷ Total Words) × 100<br>
  Qualify = Error % ≤ 8%
</div>

<!-- Colour Meaning -->
<div class="formula">
  <b>Colour Meaning:</b><br><br>
  <span style="color:green; font-weight:bold;">Green</span> → Correct Word<br>
  <span style="color:red; font-weight:bold;">Red</span> → Wrong Word (Spelling / Substitution / Capital Error)<br>
  <span style="color:blue; font-weight:bold;">Blue</span> → Extra Word (Addition)<br>
  <span style="color:black; font-weight:bold;">Black</span> → Missing Word (Omission)<br>
</div>

<script>

function normalize(word) {
  return word.replace(/[.,]/g, "");
}

// ignore words mapping
let ignoreMap = {
  "%": "percent",
  "percent": "%",
  "rs": "rupees",
  "rupees": "rs",
  "vs": "versus",
  "v/s": "versus",
  "hon": "honourable",
  "honourable": "hon"
};

// get data
let original = localStorage.getItem("original") || "";
let typed = localStorage.getItem("typed") || "";

let o = original.trim().split(/\s+/);
let t = typed.trim().split(/\s+/);

let i = 0, j = 0;

let full = 0, half = 0;
let missing = [], extra = [], wrong = [];

let output = "";

while(i < o.length && j < t.length){

  let ow = o[i];
  let tw = t[j];

  let owClean = normalize(ow).toLowerCase();
  let twClean = normalize(tw).toLowerCase();

  // ignore words
  if(ignoreMap[owClean] === twClean || ignoreMap[twClean] === owClean){
    output += "<span class='correct'>" + tw + "</span> ";
    i++; j++;
  }

  // exact match
  else if(owClean === twClean){
    output += "<span class='correct'>" + tw + "</span> ";
    i++; j++;
  }

  // singular/plural → half mistake
  else if(owClean + "s" === twClean || owClean === twClean + "s"){
    half++;
    output += "<span class='wrong'>" + tw + "</span> ";
    i++; j++;
  }

  // capital mistake → full
  else if(normalize(ow) === normalize(tw)){
    full++;
    wrong.push(tw);
    output += "<span class='wrong'>" + tw + "</span> ";
    i++; j++;
  }

  // missing word
  else if(o[i+1] && normalize(o[i+1]).toLowerCase() === twClean){
    full++;
    missing.push(ow);
    output += "<span class='missing'>[Missing: " + ow + "]</span> ";
    i++;
  }

  // extra word
  else if(t[j+1] && owClean === normalize(t[j+1]).toLowerCase()){
    full++;
    extra.push(tw);
    output += "<span class='extra'>" + tw + "</span> ";
    j++;
  }

  // wrong word
  else{
    full++;
    wrong.push(tw);
    output += "<span class='wrong'>" + tw + "</span> ";
    i++; j++;
  }
}

// remaining missing
while(i < o.length){
  missing.push(o[i]);
  output += "<span class='missing'>[Missing: " + o[i] + "]</span> ";
  full++;
  i++;
}

// remaining extra
while(j < t.length){
  extra.push(t[j]);
  output += "<span class='extra'>" + t[j] + "</span> ";
  full++;
  j++;
}

// calculation
let totalError = full + (half * 0.5);
let errorPercent = ((totalError / o.length) * 100).toFixed(2);
let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

// summary
document.getElementById("summary").innerHTML =
  "<b>Total Words:</b> " + o.length +
  "<br><b>Full Mistake:</b> " + full +
  "<br><b>Half Mistake:</b> " + half +
  "<br><b>Missing Words:</b> " + missing.length +
  "<br><b>Extra Words:</b> " + extra.length +
  "<br><b>Wrong Words:</b> " + wrong.length +
  "<br><b>Total Error:</b> " + totalError +
  "<br><b>Error %:</b> " + errorPercent +
  "<br><br><b>Status:</b> " + status;

// output
document.getElementById("words").innerHTML = output;

</script>

</body>
</html>
