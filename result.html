<!DOCTYPE html>
<html>
<head>
  <title>Detail Result</title>

  <style>
    body { font-family: Arial; background:#f2f2f2; padding:10px; }

    .box { background:#fff; padding:10px; border-radius:8px; margin-bottom:10px; }

    .btn {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .print-btn { background:#2563eb; color:white; }
    .back-btn { background:#10b981; color:white; }

    .correct { color:green; }
    .wrong { color:#8B0000; font-weight:bold; }
    .extra { color:blue; }
    .missing { color:black; font-weight:bold; }

    /* 🔥 NEW UI IMPROVEMENT */
    #comparison {
      line-height: 1.8;
      font-size: 15px;
    }

  </style>
</head>

<body>

<h2 style="text-align:center;">Detail Result</h2>

<div style="text-align:center;">
  <button class="btn print-btn" onclick="printResult()">🖨️ Print / Save PDF</button>
  <button class="btn back-btn" onclick="goBack()">⬅ Back</button>
</div>

<div class="box" id="summary"></div>
<div class="box" id="comparison"></div>

<div class="box">
<b>Formula:</b><br>
Total Error = Full Mistake + (Half Mistake × 0.5)<br>
Error % = (Total Error ÷ Total Words) × 100<br>
Qualify = Error % ≤ 8%
</div>

<div class="box">
<b>Colour Meaning:</b><br>
<span class="correct">Green</span> → Correct<br>
<span class="wrong">Dark Red</span> → Wrong / Spelling / Capital Error<br>
<span class="extra">Blue</span> → Extra Word<br>
<span class="missing">Black</span> → Missing Word
</div>

<script>

// PRINT
function printResult(){
  window.print();
}

// BACK
function goBack(){
  window.history.back();
}

// LOAD DATA
let originalText = localStorage.getItem("original");
let typedText = localStorage.getItem("typed");

// 🔥 SAFETY CHECK
if(!originalText || !typedText){
  alert("No result found. Please complete test first.");
  window.location.href = "test.html";
}

// SPLIT
let o = originalText.trim().split(/\s+/);
let t = typedText.trim().split(/\s+/);

// NORMALIZE
function normalize(word){
  return word.replace(/[.,]/g,"");
}

// IGNORE
let ignoreMap = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs",
  "vs":"versus","v/s":"versus",
  "hon":"honourable","honourable":"hon"
};

let i=0, j=0;
let full=0, half=0;
let missing=0, extra=0, wrong=0;

let resultHTML = "";

while(i < o.length && j < t.length){

  let ow = normalize(o[i]).toLowerCase();
  let tw = normalize(t[j]).toLowerCase();

  if(ow === tw){
    resultHTML += "<span class='correct'>"+o[i]+"</span> ";
    i++; j++;
    continue;
  }

  if(ignoreMap[ow] === tw || ignoreMap[tw] === ow){
    resultHTML += "<span class='correct'>"+o[i]+"</span> ";
    i++; j++;
    continue;
  }

  let found = false;

  for(let k=1; k<=3; k++){

    if(o[i+k] && normalize(o[i+k]).toLowerCase() === tw){
      for(let m=0; m<k; m++){
        resultHTML += "<span class='missing'>["+o[i+m]+"]</span> ";
        missing++; full++;
      }
      i += k;
      found = true;
      break;
    }

    if(t[j+k] && normalize(t[j+k]).toLowerCase() === ow){
      for(let m=0; m<k; m++){
        resultHTML += "<span class='extra'>"+t[j+m]+"</span> ";
        extra++; full++;
      }
      j += k;
      found = true;
      break;
    }
  }

  if(found) continue;

  if(ow+"s" === tw || ow === tw+"s"){
    resultHTML += "<span class='wrong'>"+t[j]+"</span> ";
    half++;
    i++; j++;
    continue;
  }

  resultHTML += "<span class='wrong'>"+t[j]+"</span> ";
  wrong++; full++;
  i++; j++;
}

while(i < o.length){
  resultHTML += "<span class='missing'>["+o[i]+"]</span> ";
  missing++; full++; i++;
}

while(j < t.length){
  resultHTML += "<span class='extra'>"+t[j]+"</span> ";
  extra++; full++; j++;
}

// RESULT
let totalError = full + (half * 0.5);
let errorPercent = ((totalError / o.length) * 100).toFixed(2);
let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

// 🔥 NEW ADD
let typedWords = t.length;

// SUMMARY
document.getElementById("summary").innerHTML =
  "Total Words: "+o.length+
  "<br>Typed Words: "+typedWords+
  "<br>Full Mistake: "+full+
  "<br>Half Mistake: "+half+
  "<br>Missing Words: "+missing+
  "<br>Extra Words: "+extra+
  "<br>Wrong Words: "+wrong+
  "<br>Total Error: "+totalError+
  "<br>Error %: "+errorPercent+
  "<br><br>Status: "+status;

// COMPARISON
document.getElementById("comparison").innerHTML = resultHTML;

</script>

</body>
</html>
