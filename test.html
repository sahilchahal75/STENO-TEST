<!DOCTYPE html>
<html>
<head>
  <title>Steno Test</title>

  <style>
    body { font-family: Arial; background:#f2f2f2; padding:10px; }

    .container {
      max-width:800px;
      margin:auto;
      background:#fff;
      padding:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2 { text-align:center; }

    textarea {
      width:100%;
      height:150px;
      margin-top:10px;
      padding:10px;
    }

    select, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:5px;
    }

    button { background:#2563eb; color:white; }

    #result {
      margin-top:15px;
      background:#e6f4ea;
      padding:10px;
      border-radius:8px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .login-btn { background:#10b981; }
    .logout-btn { background:#ef4444; }

  </style>
</head>

<body>

<div class="container">

<div class="topbar">
  <h3>Steno Portal</h3>
  <div>
    <span id="userName">Guest User</span>
    <button class="login-btn" onclick="login()">Login</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<h2>Steno Dictation Practice</h2>

<p id="timer">Time Left: 15:00</p>

<select id="dictSelect" onchange="loadDictation()"></select>

<audio id="audioPlayer" controls style="width:100%; margin-top:10px;"></audio>

<textarea id="text" placeholder="Type your transcription here..."></textarea>

<button onclick="startTest()">Start</button>
<button onclick="submitTest()">Submit</button>

<div id="result"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// LOGIN
window.login = ()=> signInWithPopup(auth, provider);
window.logout = ()=> signOut(auth);

// USER
onAuthStateChanged(auth, (user)=>{
  userName.innerText = user ? "👤 " + user.displayName : "Guest User";
});

// ================= DATA =================

let dictations = [];
let originalText = "";

// 🔥 LOAD JSON + FIREBASE
async function loadDictations(){

  let select = document.getElementById("dictSelect");
  select.innerHTML = "";
  dictations = [];

  // JSON
  let jsonData = await fetch("dictations.json").then(res=>res.json());

  jsonData.forEach(d=>{
    dictations.push(d);
    let opt = document.createElement("option");
    opt.text = d.name;
    select.appendChild(opt);
  });

  // FIREBASE
  let snap = await getDocs(collection(db,"dictations"));

  snap.forEach(doc=>{
    let d = doc.data();
    dictations.push(d);

    let opt = document.createElement("option");
    opt.text = d.name + " (New)";
    select.appendChild(opt);
  });

  loadDictation();
}

loadDictations();

// 🔥 FIXED LOAD
window.loadDictation = function(){

  let select = document.getElementById("dictSelect");
  let i = select.selectedIndex;

  let data = dictations[i];

  if(!data || !data.text){
    alert("⚠️ Dictation data missing!");
    return;
  }

  originalText = data.text;
  document.getElementById("audioPlayer").src = data.audio;
};

// TIMER
let time = 900;
let timer;

window.startTest = function(){

  time = 900;

  timer = setInterval(()=>{
    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
    "Time Left: "+m+":"+(s<10?"0"+s:s);

    if(time<=0){
      clearInterval(timer);
      submitTest();
    }

  },1000);
};

// NORMALIZE
function normalize(word){
  return word.replace(/[.,]/g,"").toLowerCase();
}

// IGNORE
let ignoreMap = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs",
  "vs":"versus","v/s":"versus",
  "hon":"honourable","honourable":"hon"
};

// 🔥 SUBMIT
window.submitTest = function(){

  clearInterval(timer);

  if(!originalText || originalText.length < 20){
    alert("⚠️ Dictation not loaded properly.");
    return;
  }

  let typedText = document.getElementById("text").value;

  let o = originalText.trim().split(/\s+/);
  let t = typedText.trim().split(/\s+/);

  let i=0, j=0;
  let full=0, half=0;

  while(i < o.length && j < t.length){

    let ow = normalize(o[i]);
    let tw = normalize(t[j]);

    if(ow === tw){ i++; j++; continue; }

    if(ignoreMap[ow] === tw || ignoreMap[tw] === ow){
      i++; j++; continue;
    }

    let matched = false;

    for(let k=1; k<=5; k++){

      if(o[i+k] && normalize(o[i+k]) === tw){
        full += k; i += k; matched = true; break;
      }

      if(t[j+k] && normalize(t[j+k]) === ow){
        full += k; j += k; matched = true; break;
      }
    }

    if(matched) continue;

    if(ow+"s" === tw || ow === tw+"s"){
      half++; i++; j++; continue;
    }

    full++; i++; j++;
  }

  while(i < o.length){ full++; i++; }
  while(j < t.length){ full++; j++; }

  let totalError = full + (half * 0.5);
  let errorPercent = ((totalError / o.length) * 100).toFixed(2);
  let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

  let typedWords = t.length;

  document.getElementById("result").innerHTML =
    "<b>Total Words:</b> "+o.length+
    "<br><b>Typed Words:</b> "+typedWords+
    "<br><b>Full Mistakes:</b> "+full+
    "<br><b>Half Mistakes:</b> "+half+
    "<br><b>Total Error:</b> "+totalError+
    "<br><b>Error %:</b> "+errorPercent+
    "<br><br><b>Status:</b> "+status+
    "<br><br><button onclick='viewDetail()'>View Detail Result</button>";

  // SAVE
  let user = auth.currentUser;
  if(user){
    addDoc(collection(db,"results"),{
      user:user.uid,
      name:user.displayName,
      email:user.email,
      error:errorPercent,
      totalError:totalError,
      date:new Date().toLocaleString()
    });
  }

  localStorage.setItem("original", originalText);
  localStorage.setItem("typed", typedText);
};

// DETAIL
window.viewDetail = function(){
  window.location.href = "result.html";
};

</script>

</body>
</html>
