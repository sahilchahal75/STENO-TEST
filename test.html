<!DOCTYPE html>
<html>
<head>
  <title>Steno Test</title>

  <style>
    body { font-family: Arial; text-align:center; background:#f2f2f2; padding:10px; }
    textarea { width:95%; height:150px; margin-top:10px; }
    button { padding:10px; width:95%; margin-top:10px; }
    select { padding:8px; width:95%; margin-top:10px; }
    #result { margin-top:15px; background:#fff; padding:10px; border-radius:8px; }
  </style>
</head>

<body>

<h2>Steno Dictation Practice</h2>

<p id="timer">Time Left: 15:00</p>

<!-- 🔽 Dropdown -->
<select id="dictSelect" onchange="loadDictation()"></select>

<!-- 🔊 Audio -->
<audio id="audioPlayer" controls></audio>

<textarea id="text" placeholder="Type your transcription here..."></textarea>

<button onclick="startTest()">Start</button>
<button onclick="submitTest()">Submit</button>

<div id="result"></div>

<script>

// GLOBAL
let dictations = [];
let originalText = "";

// 🔥 LOAD JSON
fetch("dictations.json")
  .then(res => res.json())
  .then(data => {
    dictations = data;

    let select = document.getElementById("dictSelect");

    dictations.forEach((d, index) => {
      let option = document.createElement("option");
      option.value = index;
      option.text = d.name;
      select.appendChild(option);
    });

    loadDictation(); // load first
  });

// LOAD SELECTED
function loadDictation(){
  let index = document.getElementById("dictSelect").value;

  originalText = dictations[index].text;

  let audio = document.getElementById("audioPlayer");
  audio.src = dictations[index].audio;
}

// TIMER
let time = 900;
let timer;

function startTest(){
  timer = setInterval(()=>{
    time--;
    let min = Math.floor(time/60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      "Time Left: " + min + ":" + (sec<10?"0"+sec:sec);

    if(time <= 0){
      clearInterval(timer);
      submitTest();
    }
  },1000);
}

// NORMALIZE
function normalize(word){
  return word.replace(/[.,]/g,"");
}

// IGNORE WORDS
let ignoreMap = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs",
  "vs":"versus","v/s":"versus",
  "hon":"honourable","honourable":"hon"
};

// MAIN LOGIC
function submitTest(){

  clearInterval(timer);

  let typedText = document.getElementById("text").value;

  let o = originalText.trim().split(/\s+/);
  let t = typedText.trim().split(/\s+/);

  let i=0, j=0;
  let full=0, half=0;

  while(i < o.length && j < t.length){

    let ow = normalize(o[i]).toLowerCase();
    let tw = normalize(t[j]).toLowerCase();

    if(ow === tw){
      i++; j++;
      continue;
    }

    if(ignoreMap[ow] === tw || ignoreMap[tw] === ow){
      i++; j++;
      continue;
    }

    let found = false;

    for(let k=1; k<=3; k++){

      if(o[i+k] && normalize(o[i+k]).toLowerCase() === tw){
        full += k;
        i += k;
        found = true;
        break;
      }

      if(t[j+k] && normalize(t[j+k]).toLowerCase() === ow){
        full += k;
        j += k;
        found = true;
        break;
      }
    }

    if(found) continue;

    if(ow+"s" === tw || ow === tw+"s"){
      half++;
      i++; j++;
      continue;
    }

    full++;
    i++; j++;
  }

  while(i < o.length){ full++; i++; }
  while(j < t.length){ full++; j++; }

  let totalError = full + (half * 0.5);
  let errorPercent = ((totalError / o.length) * 100).toFixed(2);

  let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

  document.getElementById("result").innerHTML =
    "Original Total Words: "+o.length+
    "<br>Typed Words: "+t.length+
    "<br>Full Mistakes: "+full+
    "<br>Half Mistakes: "+half+
    "<br>Total Error: "+totalError+
    "<br>Error %: "+errorPercent+
    "<br><br>Status: "+status+
    "<br><br><button onclick='viewDetail()'>View Detail Result</button>";

  localStorage.setItem("original", originalText);
  localStorage.setItem("typed", typedText);
}

function viewDetail(){
  window.location.href = "result.html";
}

</script>

</body>
</html>
