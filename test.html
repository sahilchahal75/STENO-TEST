<!DOCTYPE html>
<html>
<head>
  <title>Steno Test</title>

  <style>
    body {
      font-family: Arial;
      background:#f2f2f2;
      padding:10px;
    }

    .container {
      max-width:800px;
      margin:auto;
      background:#fff;
      padding:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2 { text-align:center; }

    textarea {
      width:100%;
      height:150px;
      margin-top:10px;
      padding:10px;
    }

    select, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:5px;
    }

    button {
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

    button:hover {
      background:#1d4ed8;
    }

    #result {
      margin-top:15px;
      background:#e6f4ea;
      padding:10px;
      border-radius:8px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .login-btn { background:#10b981; }
    .logout-btn { background:#ef4444; }

  </style>
</head>

<body>

<div class="container">

  <!-- 🔥 HEADER -->
  <div class="topbar">
    <h3>Steno Portal</h3>
    <div>
      <button class="login-btn" onclick="login()">Login</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <h2>Steno Dictation Practice</h2>

  <p id="timer">Time Left: 15:00</p>

  <!-- 🔽 DROPDOWN -->
  <select id="dictSelect" onchange="loadDictation()"></select>

  <!-- 🔊 AUDIO -->
  <audio id="audioPlayer" controls style="width:100%; margin-top:10px;"></audio>

  <textarea id="text" placeholder="Type your transcription here..."></textarea>

  <button onclick="startTest()">Start</button>
  <button onclick="submitTest()">Submit</button>

  <div id="result"></div>

</div>

<script>

// LOGIN (basic placeholder)
function login(){
  alert("Login system already connected with Firebase (next step upgrade)");
}
function logout(){
  alert("Logout successful");
}

// GLOBAL
let dictations = [];
let originalText = "";

// LOAD JSON
fetch("dictations.json")
  .then(res => res.json())
  .then(data => {

    dictations = data;

    let select = document.getElementById("dictSelect");

    select.innerHTML = "";

    dictations.forEach((d, index) => {
      let option = document.createElement("option");
      option.value = index;
      option.text = d.name;
      select.appendChild(option);
    });

    loadDictation();
  });

// LOAD SELECTED
function loadDictation(){
  let index = document.getElementById("dictSelect").value;

  if(dictations.length === 0) return;

  originalText = dictations[index].text;

  let audio = document.getElementById("audioPlayer");
  audio.src = dictations[index].audio;
}

// TIMER
let time = 900;
let timer;

function startTest(){

  time = 900;

  timer = setInterval(()=>{
    time--;

    let min = Math.floor(time/60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      "Time Left: " + min + ":" + (sec<10?"0"+sec:sec);

    if(time <= 0){
      clearInterval(timer);
      submitTest();
    }

  },1000);
}

// NORMALIZE
function normalize(word){
  return word.replace(/[.,]/g,"");
}

// IGNORE MAP
let ignoreMap = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs",
  "vs":"versus","v/s":"versus",
  "hon":"honourable","honourable":"hon"
};

// 🔥 FINAL LOGIC (FIXED)
function submitTest(){

  clearInterval(timer);

  let typedText = document.getElementById("text").value;

  let o = originalText.trim().split(/\s+/);
  let t = typedText.trim().split(/\s+/);

  let i=0, j=0;
  let full=0, half=0;

  while(i < o.length && j < t.length){

    let ow = normalize(o[i]).toLowerCase();
    let tw = normalize(t[j]).toLowerCase();

    // correct
    if(ow === tw){
      i++; j++;
      continue;
    }

    // ignore words
    if(ignoreMap[ow] === tw || ignoreMap[tw] === ow){
      i++; j++;
      continue;
    }

    // 🔥 alignment fix (1 step)
    if(o[i+1] && normalize(o[i+1]).toLowerCase() === tw){
      full++;
      i++;
      continue;
    }

    if(t[j+1] && normalize(t[j+1]).toLowerCase() === ow){
      full++;
      j++;
      continue;
    }

    // singular/plural = half
    if(ow+"s" === tw || ow === tw+"s"){
      half++;
      i++; j++;
      continue;
    }

    // wrong
    full++;
    i++; j++;
  }

  // remaining
  while(i < o.length){ full++; i++; }
  while(j < t.length){ full++; j++; }

  // FINAL RESULT
  let totalError = full + (half * 0.5);
  let errorPercent = ((totalError / o.length) * 100).toFixed(2);

  let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

  document.getElementById("result").innerHTML =
    "<b>Total Words:</b> "+o.length+
    "<br><b>Full Mistakes:</b> "+full+
    "<br><b>Half Mistakes:</b> "+half+
    "<br><b>Total Error:</b> "+totalError+
    "<br><b>Error %:</b> "+errorPercent+
    "<br><br><b>Status:</b> "+status+
    "<br><br><button onclick='viewDetail()'>View Detail Result</button>";

  // SAVE FOR RESULT PAGE
  localStorage.setItem("original", originalText);
  localStorage.setItem("typed", typedText);
}

// DETAIL PAGE
function viewDetail(){
  window.location.href = "result.html";
}

</script>

</body>
</html>
