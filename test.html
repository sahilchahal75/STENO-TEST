<!DOCTYPE html>
<html>
<head>
  <title>Steno Test</title>

  <style>
    body {
      font-family: Arial;
      background:#f2f2f2;
      padding:10px;
    }

    .container {
      max-width:800px;
      margin:auto;
      background:#fff;
      padding:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2 { text-align:center; }

    textarea {
      width:100%;
      height:150px;
      margin-top:10px;
      padding:10px;
    }

    select, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:5px;
    }

    button {
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

    #result {
      margin-top:15px;
      background:#e6f4ea;
      padding:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>Steno Dictation Practice</h2>

<p id="timer">Time Left: 15:00</p>

<select id="dictSelect" onchange="loadDictation()"></select>

<audio id="audioPlayer" controls style="width:100%; margin-top:10px;"></audio>

<textarea id="text" placeholder="Type your transcription here..."></textarea>

<button onclick="startTest()">Start</button>
<button onclick="submitTest()">Submit</button>

<div id="result"></div>

</div>

<script>

// GLOBAL
let dictations = [];
let originalText = "";

// LOAD JSON
fetch("dictations.json")
.then(res => res.json())
.then(data => {

  dictations = data;

  let select = document.getElementById("dictSelect");

  data.forEach((d,i)=>{
    let opt = document.createElement("option");
    opt.value = i;
    opt.text = d.name;
    select.appendChild(opt);
  });

  loadDictation();
});

// LOAD
function loadDictation(){
  let i = document.getElementById("dictSelect").value;
  originalText = dictations[i].text;
  document.getElementById("audioPlayer").src = dictations[i].audio;
}

// TIMER
let time = 900;
let timer;

function startTest(){

  time = 900;

  timer = setInterval(()=>{
    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
    "Time Left: "+m+":"+(s<10?"0"+s:s);

    if(time<=0){
      clearInterval(timer);
      submitTest();
    }

  },1000);
}

// NORMALIZE
function normalize(word){
  return word.replace(/[.,]/g,"").toLowerCase();
}

// IGNORE WORDS
let ignoreMap = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs",
  "vs":"versus","v/s":"versus",
  "hon":"honourable","honourable":"hon"
};

// 🔥 FINAL LOGIC
function submitTest(){

  clearInterval(timer);

  let typedText = document.getElementById("text").value;

  let o = originalText.trim().split(/\s+/);
  let t = typedText.trim().split(/\s+/);

  let i=0, j=0;
  let full=0, half=0;

  while(i < o.length && j < t.length){

    let ow = normalize(o[i]);
    let tw = normalize(t[j]);

    // correct
    if(ow === tw){
      i++; j++;
      continue;
    }

    // ignore
    if(ignoreMap[ow] === tw || ignoreMap[tw] === ow){
      i++; j++;
      continue;
    }

    // 🔥 STRONG ALIGNMENT
    let matched = false;

    for(let k=1; k<=5; k++){

      // missing
      if(o[i+k] && normalize(o[i+k]) === tw){
        full += k;
        i += k;
        matched = true;
        break;
      }

      // extra
      if(t[j+k] && normalize(t[j+k]) === ow){
        full += k;
        j += k;
        matched = true;
        break;
      }
    }

    if(matched) continue;

    // half mistake (singular/plural)
    if(ow+"s" === tw || ow === tw+"s"){
      half++;
      i++; j++;
      continue;
    }

    // wrong word
    full++;
    i++; j++;
  }

  // remaining
  while(i < o.length){ full++; i++; }
  while(j < t.length){ full++; j++; }

  // 🔥 FINAL FORMULA
  let totalError = full + (half * 0.5);
  let errorPercent = ((totalError / o.length) * 100).toFixed(2);

  let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

  document.getElementById("result").innerHTML =
    "<b>Total Words:</b> "+o.length+
    "<br><b>Full Mistakes:</b> "+full+
    "<br><b>Half Mistakes:</b> "+half+
    "<br><b>Total Error:</b> "+totalError+
    "<br><b>Error %:</b> "+errorPercent+
    "<br><br><b>Status:</b> "+status+
    "<br><br><button onclick='viewDetail()'>View Detail Result</button>";

  localStorage.setItem("original", originalText);
  localStorage.setItem("typed", typedText);
}

// DETAIL PAGE
function viewDetail(){
  window.location.href = "result.html";
}

</script>

</body>
</html>
