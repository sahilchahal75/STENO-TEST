<!DOCTYPE html>
<html>
<head>
  <title>Steno Practice Portal</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    .navbar {
      background: #1f2937;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h2 { margin: 0; }

    .nav-right button {
      margin-left: 5px;
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login-btn { background: #10b981; color: white; }
    .logout-btn { background: #ef4444; color: white; }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      height: 140px;
      margin-top: 10px;
      padding: 10px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    #result {
      margin-top: 10px;
      background: #ecfdf5;
      padding: 10px;
      border-radius: 8px;
    }

    .status-pass { color: green; font-weight: bold; }
    .status-fail { color: red; font-weight: bold; }

  </style>

  <!-- ✅ Firebase FIXED VERSION -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

</head>

<body>

<div class="navbar">
  <h2>Steno Portal</h2>

  <div class="nav-right">
    <span id="userName"></span>
    <button class="login-btn" onclick="login()">Login</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="card">

<h3>Steno Dictation Practice</h3>

<p id="timer">Time Left: 15:00</p>

<select id="dictSelect" onchange="loadDictation()"></select>

<audio id="audioPlayer" controls></audio>

<textarea id="text" placeholder="Type your transcription here..."></textarea>

<button onclick="startTest()">Start</button>
<button onclick="submitTest()">Submit</button>

<div id="result"></div>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN
function login(){
  let provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(res=>{
    document.getElementById("userName").innerText = res.user.displayName;
  });
}

// LOGOUT
function logout(){
  auth.signOut();
  document.getElementById("userName").innerText = "";
}

// LOAD JSON
let dictations = [];
let originalText = "";

fetch("dictations.json")
.then(res => res.json())
.then(data => {
  dictations = data;

  let select = document.getElementById("dictSelect");

  data.forEach((d,i)=>{
    let opt = document.createElement("option");
    opt.value = i;
    opt.text = d.name;
    select.appendChild(opt);
  });

  loadDictation();
});

// LOAD DICTATION
function loadDictation(){
  let i = document.getElementById("dictSelect").value;
  originalText = dictations[i].text;
  document.getElementById("audioPlayer").src = dictations[i].audio;
}

// TIMER
let time = 900;
let timer;

function startTest(){
  timer = setInterval(()=>{
    time--;
    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
    "Time Left: "+m+":"+(s<10?"0"+s:s);

    if(time<=0){
      clearInterval(timer);
      submitTest();
    }
  },1000);
}

// NORMALIZE
function normalize(w){
  return w.replace(/[.,]/g,"").toLowerCase();
}

// IGNORE
let ignore = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs"
};

// MAIN LOGIC
function submitTest(){

  clearInterval(timer);

  let typed = document.getElementById("text").value;
  let t = typed.trim().split(/\s+/);
  let o = originalText.trim().split(/\s+/);

  let i=0,j=0,full=0,half=0;

  while(i<o.length && j<t.length){

    let ow = normalize(o[i]);
    let tw = normalize(t[j]);

    if(ow===tw){ i++; j++; continue; }

    if(ignore[ow]===tw){ i++; j++; continue; }

    if(ow+"s"===tw || ow===tw+"s"){
      half++; i++; j++; continue;
    }

    full++; i++; j++;
  }

  full += (o.length-i) + (t.length-j);

  let total = full + (half*0.5);
  let err = ((total/o.length)*100).toFixed(2);

  let status = err<=8 
    ? "<span class='status-pass'>QUALIFY</span>" 
    : "<span class='status-fail'>DISQUALIFY</span>";

  document.getElementById("result").innerHTML =
    "Total Words: "+o.length+
    "<br>Full Mistake: "+full+
    "<br>Half Mistake: "+half+
    "<br>Error %: "+err+
    "<br><br>Status: "+status+
    "<br><br><button onclick='viewDetail()'>View Detail Result</button>";

  // SAVE FOR DETAIL PAGE
  localStorage.setItem("original", originalText);
  localStorage.setItem("typed", typed);
}

// DETAIL PAGE
function viewDetail(){
  window.location.href = "result.html";
}

</script>

</body>
</html>
