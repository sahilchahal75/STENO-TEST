<!DOCTYPE html>
<html>
<head>
  <title>Steno Test</title>

  <style>
    body { font-family: Arial; background:#f2f2f2; padding:10px; }

    .container {
      max-width:800px;
      margin:auto;
      background:#fff;
      padding:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2 { text-align:center; }

    textarea {
      width:100%;
      height:150px;
      margin-top:10px;
      padding:10px;
    }

    select, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:5px;
    }

    button { background:#2563eb; color:white; }

    #result {
      margin-top:15px;
      background:#e6f4ea;
      padding:10px;
      border-radius:8px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .login-btn { background:#10b981; }
    .logout-btn { background:#ef4444; }

  </style>
</head>

<body>

<div class="container">

<div class="topbar">
  <h3>Steno Portal</h3>
  <div>
    <span id="userName">Guest User</span>
    <button class="login-btn" onclick="login()">Login</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<h2>Steno Dictation Practice</h2>

<p id="timer">Time Left: 15:00</p>

<select id="dictSelect" onchange="loadDictation()"></select>

<audio id="audioPlayer" controls style="width:100%; margin-top:10px;"></audio>

<textarea id="text" placeholder="Type your transcription here..."></textarea>

<button onclick="startTest()">Start</button>
<button onclick="submitTest()">Submit</button>

<div id="result"></div>

</div>

<!-- 🔥 FIREBASE + LOGIC -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc",
  storageBucket: "steno-test-daecc.firebasestorage.app",
  messagingSenderId: "636984354290",
  appId: "1:636984354290:web:d1d9d7bcd3e88422b7776b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// LOGIN
window.login = function(){
  if(/Mobi|Android/i.test(navigator.userAgent)){
    signInWithRedirect(auth, provider);
  } else {
    signInWithPopup(auth, provider)
      .then((result)=>{
        localStorage.setItem("user", result.user.uid);
        alert("Login Successful ✅");
      })
      .catch(err=>alert(err.message));
  }
};

// REDIRECT RESULT
getRedirectResult(auth).then((result)=>{
  if(result){
    localStorage.setItem("user", result.user.uid);
    alert("Login Successful ✅");
  }
});

// LOGOUT
window.logout = function(){
  signOut(auth).then(()=>{
    localStorage.removeItem("user");
    alert("Logout Successful");
  });
};

// USER NAME
onAuthStateChanged(auth, (user)=>{
  let box = document.getElementById("userName");
  if(user){
    box.innerText = "👤 " + user.displayName;
  } else {
    box.innerText = "Guest User";
  }
});

// ================= NORMAL SCRIPT =================

let dictations = [];
let originalText = "";

// LOAD JSON
fetch("dictations.json")
.then(res=>res.json())
.then(data=>{
  dictations = data;

  let select = document.getElementById("dictSelect");

  data.forEach((d,i)=>{
    let opt = document.createElement("option");
    opt.value = i;
    opt.text = d.name;
    select.appendChild(opt);
  });

  loadDictation();
});

// LOAD
window.loadDictation = function(){
  let i = document.getElementById("dictSelect").value;
  originalText = dictations[i].text;
  document.getElementById("audioPlayer").src = dictations[i].audio;
};

// TIMER
let time = 900;
let timer;

window.startTest = function(){

  time = 900;

  timer = setInterval(()=>{
    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
    "Time Left: "+m+":"+(s<10?"0"+s:s);

    if(time<=0){
      clearInterval(timer);
      submitTest();
    }

  },1000);
};

// NORMALIZE
function normalize(word){
  return word.replace(/[.,]/g,"").toLowerCase();
}

// IGNORE
let ignoreMap = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs",
  "vs":"versus","v/s":"versus",
  "hon":"honourable","honourable":"hon"
};

// 🔥 FINAL LOGIC
window.submitTest = function(){

  clearInterval(timer);

  // 🔥 GUEST LIMIT
  let user = localStorage.getItem("user");

  if(!user){
    let count = localStorage.getItem("guestCount") || 0;
    count++;

    localStorage.setItem("guestCount", count);

    if(count > 2){
      alert("⚠️ Guest limit over! Please login.");
      return;
    }
  }

  let typedText = document.getElementById("text").value;

  let o = originalText.trim().split(/\s+/);
  let t = typedText.trim().split(/\s+/);

  let i=0, j=0;
  let full=0, half=0;

  while(i < o.length && j < t.length){

    let ow = normalize(o[i]);
    let tw = normalize(t[j]);

    if(ow === tw){
      i++; j++;
      continue;
    }

    if(ignoreMap[ow] === tw || ignoreMap[tw] === ow){
      i++; j++;
      continue;
    }

    let matched = false;

    for(let k=1; k<=5; k++){

      if(o[i+k] && normalize(o[i+k]) === tw){
        full += k;
        i += k;
        matched = true;
        break;
      }

      if(t[j+k] && normalize(t[j+k]) === ow){
        full += k;
        j += k;
        matched = true;
        break;
      }
    }

    if(matched) continue;

    if(ow+"s" === tw || ow === tw+"s"){
      half++;
      i++; j++;
      continue;
    }

    full++;
    i++; j++;
  }

  while(i < o.length){ full++; i++; }
  while(j < t.length){ full++; j++; }

  let totalError = full + (half * 0.5);
  let errorPercent = ((totalError / o.length) * 100).toFixed(2);

  let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

  document.getElementById("result").innerHTML =
    "<b>Total Words:</b> "+o.length+
    "<br><b>Full Mistakes:</b> "+full+
    "<br><b>Half Mistakes:</b> "+half+
    "<br><b>Total Error:</b> "+totalError+
    "<br><b>Error %:</b> "+errorPercent+
    "<br><br><b>Status:</b> "+status+
    "<br><br><button onclick='viewDetail()'>View Detail Result</button>";

  // SAVE RESULT
  if(user){
    addDoc(collection(db,"results"),{
      user:user,
      error:errorPercent,
      totalError:totalError,
      date:new Date().toLocaleString()
    });
  }

  localStorage.setItem("original", originalText);
  localStorage.setItem("typed", typedText);
};

// DETAIL PAGE
window.viewDetail = function(){
  window.location.href = "result.html";
};

</script>

</body>
</html>
