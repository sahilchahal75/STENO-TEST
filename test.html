<!DOCTYPE html>
<html>
<head>
  <title>Steno Test</title>

  <style>
    body { font-family: Arial; text-align:center; background:#f2f2f2; padding:10px; }
    textarea { width:95%; height:150px; margin-top:10px; }
    button { padding:10px; width:95%; margin-top:10px; }
    #result { margin-top:15px; background:#fff; padding:10px; border-radius:8px; }
  </style>
</head>

<body>

<h2>Steno Dictation Practice</h2>

<p id="timer">Time Left: 15:00</p>

<audio controls>
  <source src="dict1.mp3" type="audio/mpeg">
</audio>

<textarea id="text" placeholder="Type your transcription here..."></textarea>

<button onclick="startTest()">Start</button>
<button onclick="submitTest()">Submit</button>

<div id="result"></div>

<script>

let originalText = `Mr. Vice Chairman Sir I thank you for giving me this opportunity to speak on the Banking Public Financial Institutions and Negotiable Instruments Law Amendment Bill 2008. Sir if we go back to the history when the announcement was made by Smt. Indira Gandhi our former Prime Minister we had seen that there was opposition even from the Congressman against the progressive thinking and they said that the banks should not be nationalised. But Indiraji was committed to it. She made it a point to see that the banks are nationalised so that the gates are opened for the purpose of helping the poor and the downtrodden. Sir we have to accept the fact that the banks have become public institutions nowadays and even the poor people can go there and get loans. I would like to submit that in some banks the system of lending money and providing financial assistance to the small businessmen agriculturists and the persons who are small vendors has not been taken very seriously. In the last year Budget the 2008-09 Budget which was presented by the then Finance Minister the thrust was given to agriculture.`;

// TIMER
let time = 900;
let timer;

function startTest(){
  timer = setInterval(()=>{
    time--;
    let min = Math.floor(time/60);
    let sec = time % 60;
    document.getElementById("timer").innerText =
      "Time Left: " + min + ":" + (sec<10?"0"+sec:sec);

    if(time <= 0){
      clearInterval(timer);
      submitTest();
    }
  },1000);
}

// NORMALIZE
function normalize(word){
  return word.replace(/[.,]/g,"");
}

// IGNORE WORDS
let ignoreMap = {
  "%":"percent","percent":"%",
  "rs":"rupees","rupees":"rs",
  "vs":"versus","v/s":"versus",
  "hon":"honourable","honourable":"hon"
};

// MAIN LOGIC
function submitTest(){

  clearInterval(timer);

  let typedText = document.getElementById("text").value;

  let o = originalText.trim().split(/\s+/);
  let t = typedText.trim().split(/\s+/);

  let i=0, j=0;
  let full=0, half=0;

  while(i < o.length && j < t.length){

    let ow = normalize(o[i]).toLowerCase();
    let tw = normalize(t[j]).toLowerCase();

    // correct
    if(ow === tw){
      i++; j++;
      continue;
    }

    // ignore words
    if(ignoreMap[ow] === tw || ignoreMap[tw] === ow){
      i++; j++;
      continue;
    }

    // SHIFT FIX (important)
    if(o[i+1] && normalize(o[i+1]).toLowerCase() === tw){
      full++; // missing
      i++;
      continue;
    }

    if(t[j+1] && normalize(t[j+1]).toLowerCase() === ow){
      full++; // extra
      j++;
      continue;
    }

    // singular/plural
    if(ow+"s" === tw || ow === tw+"s"){
      half++;
      i++; j++;
      continue;
    }

    // wrong
    full++;
    i++; j++;
  }

  // remaining words
  while(i < o.length){ full++; i++; }
  while(j < t.length){ full++; j++; }

  let totalError = full + (half * 0.5);
  let errorPercent = ((totalError / o.length) * 100).toFixed(2);

  let status = errorPercent <= 8 ? "✅ QUALIFY" : "❌ DISQUALIFY";

  document.getElementById("result").innerHTML =
    "Original Total Words: "+o.length+
    "<br>Typed Words: "+t.length+
    "<br>Full Mistakes: "+full+
    "<br>Half Mistakes: "+half+
    "<br>Error %: "+errorPercent+
    "<br><br>Status: "+status+
    "<br><br><button onclick='viewDetail()'>View Detail Result</button>";

  // save for detail page
  localStorage.setItem("original", originalText);
  localStorage.setItem("typed", typedText);
}

function viewDetail(){
  window.location.href = "result.html";
}

</script>

</body>
</html>
