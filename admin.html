<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  padding:15px;
  background:#1e293b;
  display:flex;
  justify-content:space-between;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.login{background:#22c55e;}
.logout{background:#ef4444;}

.container{
  padding:10px;
}

.cards{
  display:flex;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:120px;
  background:#1e293b;
  margin:5px;
  padding:10px;
  border-radius:8px;
  text-align:center;
}

.box{
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
}

.list{
  background:white;
  color:black;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
  <h3>👨‍💼 Admin Analytics</h3>
  <div>
    <span id="adminName"></span>
    <button class="btn login" onclick="login()">Login</button>
    <button class="btn logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<div id="loginMsg">🔐 Please login as Admin</div>

<div id="dashboard" style="display:none;">

<!-- 🔥 STATS -->
<div class="cards">
  <div class="card">👤 Users<br><b id="users">0</b></div>
  <div class="card">📝 Tests<br><b id="tests">0</b></div>
  <div class="card">📊 Avg Error<br><b id="avg">0%</b></div>
</div>

<!-- 📊 GRAPH -->
<div class="box">
  <canvas id="graph"></canvas>
</div>

<!-- 🏆 TOP USERS -->
<div class="box">
  <h3>🏆 Top 5 Performers</h3>
  <div id="top"></div>
</div>

<!-- 📂 CATEGORY -->
<div class="box">
  <h3>📂 Category Analysis</h3>
  <div id="cat"></div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let chart;

// LOGIN
window.login = ()=> signInWithPopup(auth,provider);
window.logout = ()=> signOut(auth);

// AUTH CHECK
onAuthStateChanged(auth, async(user)=>{

  if(!user){
    document.getElementById("dashboard").style.display="none";
    document.getElementById("loginMsg").style.display="block";
    return;
  }

  if(user.email !== "xsahil900@gmail.com"){
    document.getElementById("loginMsg").innerText =
    "❌ You are not an Admin";
    return;
  }

  document.getElementById("adminName").innerText =
  "👑 "+user.displayName;

  document.getElementById("dashboard").style.display="block";
  document.getElementById("loginMsg").style.display="none";

  loadData();
});

// LOAD DATA
async function loadData(){

  const snap = await getDocs(collection(db,"results"));

  let data=[];
  let usersSet=new Set();
  let totalError=0;

  let category={KC:0,Progressive:0,Exam:0};

  snap.forEach(doc=>{
    let d=doc.data();
    d.error=parseFloat(d.error);

    data.push(d);
    usersSet.add(d.email);

    totalError+=d.error;

    if(d.category) category[d.category]++;
  });

  // STATS
  document.getElementById("users").innerText = usersSet.size;
  document.getElementById("tests").innerText = data.length;
  document.getElementById("avg").innerText =
    (totalError/data.length).toFixed(2)+"%";

  // GRAPH
  let last=data.slice(-10);
  let labels=last.map((d,i)=>"T"+(i+1));
  let values=last.map(d=>d.error);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("graph"),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{label:"Error %",data:values}]
    }
  });

  // TOP USERS
  data.sort((a,b)=>a.error-b.error);

  let topHTML="";
  data.slice(0,5).forEach((d,i)=>{
    topHTML+=`
    <div class="list">
      #${i+1} 👤 ${d.name || "User"} - ${d.error}%
    </div>`;
  });

  document.getElementById("top").innerHTML=topHTML;

  // CATEGORY
  document.getElementById("cat").innerHTML=
  `KC: ${category.KC}<br>
   Progressive: ${category.Progressive}<br>
   Exam: ${category.Exam}`;
}

</script>

</body>
</html>
