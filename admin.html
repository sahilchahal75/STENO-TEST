<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover;
  color:white;
}

.overlay{
  background:rgba(0,0,0,0.9);
  min-height:100vh;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:15px auto;
  border-radius:10px;
  max-width:500px;
}

.btn{
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.login{background:#22c55e;}
.logout{background:#ef4444;}
.delete{background:#dc2626;color:white;}
.edit{background:#2563eb;color:white;}

.dataBox{
  background:white;
  color:black;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="overlay">

<div id="loginBox" class="card">
  <h2>👨‍💼 Admin Login</h2>
  <button class="btn login" onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

<div class="card">
  <h2>👑 Admin Dashboard</h2>
  <p id="adminName"></p>
  <button class="btn logout" onclick="logout()">Logout</button>
</div>

<!-- 📤 Upload -->
<div class="card">
  <h3>📤 Upload</h3>
  <button onclick="goUpload()">Go to Upload Page</button>
</div>

<!-- 📂 Dictations -->
<div class="card">
  <h3>📂 Manage Dictations</h3>
  <div id="dictList"></div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// LOGIN
window.login = () => signInWithPopup(auth, provider);

// LOGOUT
window.logout = () => signOut(auth);

// AUTH CHECK
onAuthStateChanged(auth, (user)=>{

  if(!user){
    loginBox.style.display="block";
    adminPanel.style.display="none";
    return;
  }

  if(user.email !== "xsahil900@gmail.com"){
    alert("❌ Not Admin");
    signOut(auth);
    return;
  }

  loginBox.style.display="none";
  adminPanel.style.display="block";

  adminName.innerText = "👤 " + user.displayName;

  loadDictations();
});

// LOAD DICTATIONS
function loadDictations(){

  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  let html="";

  data.forEach((d,i)=>{
    html+=`
    <div class="dataBox">
      <b>${d.name}</b><br>
      📂 ${d.category}<br>
      🔊 <a href="${d.audio}" target="_blank">Audio</a><br>

      <button class="btn edit" onclick="editDict(${i})">Edit</button>
      <button class="btn delete" onclick="deleteDict(${i})">Delete</button>
    </div>
    `;
  });

  document.getElementById("dictList").innerHTML=html;
}

// DELETE
window.deleteDict = function(i){

  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  if(confirm("Delete this dictation?")){
    data.splice(i,1);
    localStorage.setItem("dictations", JSON.stringify(data));
    loadDictations();
  }
};

// EDIT
window.editDict = function(i){

  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  let newName = prompt("Edit Name:", data[i].name);
  let newAudio = prompt("Edit Audio URL:", data[i].audio);

  if(newName) data[i].name = newName;
  if(newAudio) data[i].audio = newAudio;

  localStorage.setItem("dictations", JSON.stringify(data));

  loadDictations();
};

// GO UPLOAD
window.goUpload = function(){
  window.location.href="upload.html";
};

</script>

</body>
</html>
