<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover;
  color:white;
}

.overlay{
  background:rgba(0,0,0,0.9);
  min-height:100vh;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:15px auto;
  border-radius:10px;
  max-width:500px;
}

input, textarea, select{
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:5px;
  border:none;
}

.btn{
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.login{background:#22c55e;}
.logout{background:#ef4444;}
.delete{background:#dc2626;color:white;}
.edit{background:#2563eb;color:white;}
.upload{background:#10b981;color:white;}

.dataBox{
  background:white;
  color:black;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="overlay">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>👨‍💼 Admin Login</h2>
  <button class="btn login" onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none;">

<div class="card">
  <h2>👑 Admin Dashboard</h2>
  <p id="adminName"></p>
  <button class="btn logout" onclick="logout()">Logout</button>
</div>

<!-- 🔥 UPLOAD + MANAGE -->
<div class="card">
  <h3>📤 Upload / Manage Dictation</h3>

  <input type="text" id="name" placeholder="Dictation Name">
  
  <select id="category">
    <option>KC Magazine</option>
    <option>Progressive Magazine</option>
    <option>Real Exam</option>
  </select>

  <input type="text" id="audio" placeholder="Audio Link">
  <textarea id="text" placeholder="Dictation Text"></textarea>

  <button class="btn upload" onclick="uploadDict()">Upload</button>

  <hr>

  <h4>📂 Existing Dictations</h4>
  <div id="dictList"></div>
</div>

<!-- 📊 ANALYTICS -->
<div class="card">
  <h3>📊 Analytics</h3>
  <p id="totalUsers">Users: 0</p>
  <p id="totalTests">Tests: 0</p>
  <p id="avgError">Avg Error: 0%</p>
</div>

<!-- 👥 USERS -->
<div class="card">
  <h3>👥 Users Performance</h3>
  <div id="userData"></div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// LOGIN
window.login = ()=> signInWithPopup(auth, provider);

// LOGOUT
window.logout = ()=> signOut(auth);

// AUTH CHECK
onAuthStateChanged(auth, (user)=>{

  if(!user){
    loginBox.style.display="block";
    adminPanel.style.display="none";
    return;
  }

  if(user.email !== "xsahil900@gmail.com"){
    alert("❌ You are not Admin");
    signOut(auth);
    return;
  }

  loginBox.style.display="none";
  adminPanel.style.display="block";

  adminName.innerText = "👤 " + user.displayName;

  loadDictations();
  loadUsers();
});

// 🔥 UPLOAD
window.uploadDict=function(){

  let name = document.getElementById("name").value;
  let category = document.getElementById("category").value;
  let audio = document.getElementById("audio").value;
  let text = document.getElementById("text").value;

  if(!name || !audio || !text){
    alert("Fill all fields");
    return;
  }

  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  data.push({name, category, audio, text});

  localStorage.setItem("dictations", JSON.stringify(data));

  alert("✅ Uploaded");

  loadDictations();
};

// LOAD DICTATIONS
function loadDictations(){

  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  let html="";

  data.forEach((d,i)=>{
    html+=`
    <div class="dataBox">
      <b>${d.name}</b><br>
      📂 ${d.category}<br>

      <button class="btn edit" onclick="editDict(${i})">Edit</button>
      <button class="btn delete" onclick="deleteDict(${i})">Delete</button>
    </div>
    `;
  });

  document.getElementById("dictList").innerHTML = html;
}

// DELETE
window.deleteDict=function(i){

  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  if(confirm("Delete?")){
    data.splice(i,1);
    localStorage.setItem("dictations", JSON.stringify(data));
    loadDictations();
  }
};

// EDIT
window.editDict=function(i){

  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  let name = prompt("Edit Name", data[i].name);
  let audio = prompt("Edit Audio", data[i].audio);

  if(name) data[i].name=name;
  if(audio) data[i].audio=audio;

  localStorage.setItem("dictations", JSON.stringify(data));

  loadDictations();
};

// 🔥 USERS DATA + ANALYTICS
async function loadUsers(){

  const snap = await getDocs(collection(db,"results"));

  let html="";
  let totalError=0;
  let count=0;

  snap.forEach(doc=>{
    let d = doc.data();

    html += `
    <div class="dataBox">
      👤 ${d.name || "N/A"}<br>
      📧 ${d.email || "N/A"}<br>
      ❌ Error: ${d.error}%<br>
      📅 ${d.date}
    </div>`;

    totalError += parseFloat(d.error || 0);
    count++;
  });

  document.getElementById("userData").innerHTML = html;

  document.getElementById("totalUsers").innerText = "Users: " + count;
  document.getElementById("totalTests").innerText = "Tests: " + count;

  let avg = count ? (totalError/count).toFixed(2) : 0;
  document.getElementById("avgError").innerText = "Avg Error: " + avg + "%";
}

</script>

</body>
</html>
