<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover;
}

.overlay{
  background:rgba(0,0,0,0.85);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.box{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.btn{
  padding:10px;
  border:none;
  border-radius:6px;
  margin-top:10px;
  width:100%;
  cursor:pointer;
}

.login{background:#22c55e;color:white;}
.logout{background:#ef4444;color:white;}

.dataBox{
  background:white;
  color:black;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  text-align:left;
}
</style>
</head>

<body>

<div class="overlay">

<!-- 🔐 LOGIN BOX -->
<div id="loginBox" class="box">
  <h2>👨‍💼 Admin Panel</h2>
  <p>🔐 Admin Login Required</p>
  <button class="btn login" onclick="login()">Login with Google</button>
</div>

<!-- 📊 ADMIN PANEL -->
<div id="adminPanel" class="box" style="display:none;">

  <h2>👑 Admin Panel</h2>

  <p id="adminName"></p>

  <button class="btn logout" onclick="logout()">Logout</button>

  <h3>📊 All Users Performance</h3>

  <select onchange="sortData(this.value)">
    <option value="low">Lowest Error</option>
    <option value="high">Highest Error</option>
  </select>

  <div id="data"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let allData=[];

// LOGIN
window.login = function(){
  signInWithPopup(auth, provider);
};

// LOGOUT
window.logout = function(){
  signOut(auth);
};

// AUTH CHECK
onAuthStateChanged(auth, async(user)=>{

  if(!user){
    document.getElementById("loginBox").style.display="block";
    document.getElementById("adminPanel").style.display="none";
    return;
  }

  // ❌ WRONG USER
  if(user.email !== "xsahil900@gmail.com"){
    alert("❌ You are not an Admin. Please use User login.");
    signOut(auth);
    return;
  }

  // ✅ ADMIN LOGIN
  document.getElementById("loginBox").style.display="none";
  document.getElementById("adminPanel").style.display="block";

  document.getElementById("adminName").innerText =
    "👤 " + user.displayName;

  loadData();
});

// LOAD DATA
async function loadData(){

  const snap = await getDocs(collection(db,"results"));

  allData=[];

  snap.forEach(doc=>{
    let d=doc.data();
    d.error=parseFloat(d.error);
    allData.push(d);
  });

  showData(allData);
}

// SHOW DATA
function showData(data){

  let html="";

  data.forEach((d,i)=>{
    html+=`
    <div class="dataBox">
      <b>#${i+1}</b><br>
      👤 ${d.name || "N/A"}<br>
      📧 ${d.email || "N/A"}<br>
      ❌ Error: ${d.error}%<br>
      📅 ${d.date}
    </div>`;
  });

  document.getElementById("data").innerHTML=html;
}

// SORT
window.sortData=function(type){
  if(type==="low"){
    allData.sort((a,b)=>a.error-b.error);
  }else{
    allData.sort((a,b)=>b.error-a.error);
  }
  showData(allData);
};

</script>

</body>
</html>
