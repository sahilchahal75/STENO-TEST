<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover;
  color:white;
}

.overlay{
  background:rgba(0,0,0,0.9);
  min-height:100vh;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:15px auto;
  border-radius:10px;
  max-width:500px;
}

.btn{
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.login{background:#22c55e;}
.logout{background:#ef4444;}
.delete{background:#dc2626;color:white;}
.edit{background:#2563eb;color:white;}

.dataBox{
  background:white;
  color:black;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="overlay">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>👨‍💼 Admin Login</h2>
  <button class="btn login" onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none;">

<div class="card">
  <h2>👑 Admin Dashboard</h2>
  <p id="adminName"></p>
  <button class="btn logout" onclick="logout()">Logout</button>
</div>

<!-- UPLOAD -->
<div class="card">
  <h3>📤 Upload Dictation</h3>
  <button onclick="goUpload()">Go to Upload</button>
</div>

<!-- ANALYTICS -->
<div class="card">
  <h3>📊 Analytics</h3>
  <p id="totalUsers"></p>
  <p id="totalTests"></p>
  <p id="avgError"></p>
</div>

<!-- SEARCH -->
<div class="card">
  <h3>🔍 Search User</h3>
  <input type="text" placeholder="Search name..." onkeyup="searchUser(this.value)" style="width:100%;padding:8px;">
</div>

<!-- USERS -->
<div class="card">
  <h3>👥 Users Performance</h3>

  <select onchange="sortData(this.value)">
    <option value="low">Lowest Error</option>
    <option value="high">Highest Error</option>
  </select>

  <div id="data"></div>
</div>

<!-- DICTATIONS -->
<div class="card">
  <h3>📂 Manage Dictations</h3>
  <div id="dictList"></div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let allData=[];

// LOGIN
window.login = ()=> signInWithPopup(auth, provider);

// LOGOUT
window.logout = ()=> signOut(auth);

// AUTH CHECK
onAuthStateChanged(auth, async(user)=>{

  if(!user){
    loginBox.style.display="block";
    adminPanel.style.display="none";
    return;
  }

  if(user.email !== "xsahil900@gmail.com"){
    alert("❌ Not Admin");
    signOut(auth);
    return;
  }

  loginBox.style.display="none";
  adminPanel.style.display="block";

  adminName.innerText = "👤 " + user.displayName;

  loadUsers();
  loadDictations();
});

// USERS DATA
async function loadUsers(){

  const snap = await getDocs(collection(db,"results"));

  allData=[];

  let totalError=0;

  snap.forEach(doc=>{
    let d=doc.data();
    d.error=parseFloat(d.error);
    allData.push(d);
    totalError+=d.error;
  });

  document.getElementById("totalUsers").innerText="Users: "+allData.length;
  document.getElementById("totalTests").innerText="Tests: "+allData.length;
  document.getElementById("avgError").innerText="Avg Error: "+(totalError/allData.length).toFixed(2)+"%";

  showData(allData);
}

// SHOW USERS
function showData(data){

  let html="";

  data.forEach((d,i)=>{
    html+=`
    <div class="dataBox">
      <b>#${i+1}</b><br>
      👤 ${d.name || "N/A"}<br>
      📧 ${d.email || "N/A"}<br>
      ❌ Error: ${d.error}%<br>
      📅 ${d.date}
    </div>`;
  });

  document.getElementById("data").innerHTML=html;
}

// SORT
window.sortData=function(type){
  if(type==="low"){
    allData.sort((a,b)=>a.error-b.error);
  }else{
    allData.sort((a,b)=>b.error-a.error);
  }
  showData(allData);
};

// SEARCH
window.searchUser=function(val){
  let filtered = allData.filter(d =>
    (d.name||"").toLowerCase().includes(val.toLowerCase())
  );
  showData(filtered);
};

// DICTATIONS
function loadDictations(){

  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  let html="";

  data.forEach((d,i)=>{
    html+=`
    <div class="dataBox">
      <b>${d.name}</b><br>
      📂 ${d.category}<br>

      <button class="btn edit" onclick="editDict(${i})">Edit</button>
      <button class="btn delete" onclick="deleteDict(${i})">Delete</button>
    </div>
    `;
  });

  document.getElementById("dictList").innerHTML=html;
}

// DELETE
window.deleteDict=function(i){
  let data = JSON.parse(localStorage.getItem("dictations") || "[]");
  if(confirm("Delete?")){
    data.splice(i,1);
    localStorage.setItem("dictations", JSON.stringify(data));
    loadDictations();
  }
};

// EDIT
window.editDict=function(i){
  let data = JSON.parse(localStorage.getItem("dictations") || "[]");

  let name = prompt("Edit Name", data[i].name);
  let audio = prompt("Edit Audio URL", data[i].audio);

  if(name) data[i].name=name;
  if(audio) data[i].audio=audio;

  localStorage.setItem("dictations", JSON.stringify(data));
  loadDictations();
};

// GO UPLOAD
window.goUpload=function(){
  window.location.href="upload.html";
};

</script>

</body>
</html>
