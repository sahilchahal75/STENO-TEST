<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:15px auto;
  border-radius:10px;
  max-width:400px;
  cursor:pointer;
}

.btn{
  padding:10px;
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.login{background:#22c55e;color:white;}
.logout{background:#ef4444;color:white;}

.dataBox{
  background:white;
  color:black;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">

<div id="loginBox">
  <h2>👨‍💼 Admin Panel</h2>
  <button class="btn login" onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

  <h2>👑 Welcome Admin</h2>
  <p id="adminName"></p>

  <button class="btn logout" onclick="logout()">Logout</button>

  <!-- 🔥 UPLOAD -->
  <div class="card" onclick="goUpload()">
    <h3>📤 Upload Dictation</h3>
    <p>Add new dictation (audio link + text)</p>
  </div>

  <!-- 📊 USERS -->
  <div class="card">
    <h3>📊 All Users Performance</h3>

    <select onchange="sortData(this.value)">
      <option value="low">Lowest Error</option>
      <option value="high">Highest Error</option>
    </select>

    <div id="data"></div>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let allData=[];

window.login = function(){
  signInWithPopup(auth, provider);
};

window.logout = function(){
  signOut(auth);
};

onAuthStateChanged(auth, async(user)=>{

  if(!user){
    loginBox.style.display="block";
    adminPanel.style.display="none";
    return;
  }

  if(user.email !== "xsahil900@gmail.com"){
    alert("❌ You are not an Admin. Please use User login.");
    signOut(auth);
    return;
  }

  loginBox.style.display="none";
  adminPanel.style.display="block";

  adminName.innerText = "👤 " + user.displayName;

  loadData();
});

async function loadData(){
  const snap = await getDocs(collection(db,"results"));
  allData=[];

  snap.forEach(doc=>{
    let d=doc.data();
    d.error=parseFloat(d.error);
    allData.push(d);
  });

  showData(allData);
}

function showData(data){
  let html="";
  data.forEach((d,i)=>{
    html+=`
    <div class="dataBox">
      <b>#${i+1}</b><br>
      👤 ${d.name || "N/A"}<br>
      📧 ${d.email || "N/A"}<br>
      ❌ Error: ${d.error}%<br>
      📅 ${d.date}
    </div>`;
  });

  document.getElementById("data").innerHTML=html;
}

window.sortData=function(type){
  if(type==="low"){
    allData.sort((a,b)=>a.error-b.error);
  }else{
    allData.sort((a,b)=>b.error-a.error);
  }
  showData(allData);
};

window.goUpload=function(){
  window.location.href="upload.html";
};

</script>

</body>
</html>
