<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover;
  color:white;
}
.overlay{
  background:rgba(0,0,0,0.9);
  min-height:100vh;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:20px;
  margin:15px auto;
  border-radius:10px;
  max-width:500px;
}
input, textarea, select{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:5px;
}
.btn{
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.login{background:#22c55e;}
.logout{background:#ef4444;}
.upload{background:#10b981;color:white;}
.delete{background:#dc2626;color:white;}
.edit{background:#2563eb;color:white;}
.goto{background:#f59e0b;color:white;}
</style>
</head>

<body>

<div class="overlay">

<!-- 🔐 LOGIN -->
<div id="loginBox" class="card">
  <h2>🔐 Admin Login</h2>
  <button class="btn login" onclick="login()">Login with Google</button>
</div>

<!-- 🔥 ADMIN PANEL -->
<div id="adminPanel" style="display:none;">

<div class="card">
<h2>👑 Admin Panel</h2>
<p id="adminName"></p>
<button class="btn logout" onclick="logout()">Logout</button>
<button class="btn goto" onclick="goAnalytics()">📊 Analytics</button>
</div>

<div class="card">
<h3>📤 Upload + Manage Dictation</h3>

<input id="name" placeholder="Name">
<select id="category">
<option>KC</option>
<option>Progressive</option>
<option>Exam</option>
</select>
<input id="audio" placeholder="Audio Link">
<textarea id="text" placeholder="Text"></textarea>

<button class="btn upload" onclick="uploadDict()">Upload</button>

<hr>

<div id="dictList"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// LOGIN
window.login = ()=> signInWithPopup(auth, provider);

// LOGOUT
window.logout = ()=> signOut(auth);

// 🔐 AUTH CHECK
onAuthStateChanged(auth,(user)=>{

  if(!user){
    loginBox.style.display="block";
    adminPanel.style.display="none";
    return;
  }

  // ❌ WRONG USER
  if(user.email !== "xsahil900@gmail.com"){
    alert("❌ You are not Admin");
    signOut(auth);
    return;
  }

  // ✅ ADMIN
  loginBox.style.display="none";
  adminPanel.style.display="block";

  adminName.innerText = "👤 " + user.displayName;

  loadDict();
});

// GO ANALYTICS
window.goAnalytics=function(){
  window.location.href="analytics.html";
};

// UPLOAD
window.uploadDict=function(){

let data=JSON.parse(localStorage.getItem("dictations")||"[]");

data.push({
name:name.value,
category:category.value,
audio:audio.value,
text:text.value
});

localStorage.setItem("dictations",JSON.stringify(data));

alert("Uploaded");
loadDict();
};

// LOAD
function loadDict(){

let data=JSON.parse(localStorage.getItem("dictations")||"[]");

let html="";

data.forEach((d,i)=>{
html+=`
<div style="background:white;color:black;padding:10px;margin-top:10px;border-radius:8px;">
<b>${d.name}</b><br>
${d.category}<br>

<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>
</div>`;
});

dictList.innerHTML=html;
}

// DELETE
window.del=function(i){
let data=JSON.parse(localStorage.getItem("dictations"));
data.splice(i,1);
localStorage.setItem("dictations",JSON.stringify(data));
loadDict();
};

// EDIT
window.edit=function(i){

let data=JSON.parse(localStorage.getItem("dictations"));

let n=prompt("Name",data[i].name);
let a=prompt("Audio",data[i].audio);

if(n) data[i].name=n;
if(a) data[i].audio=a;

localStorage.setItem("dictations",JSON.stringify(data));
loadDict();
};

</script>

</body>
</html>
