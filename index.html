<!DOCTYPE html>
<html>
<head>
  <title>Steno Practice Portal</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      background: #333;
      color: white;
      padding: 15px;
      margin: 0;
    }

    .container {
      margin-top: 30px;
      padding: 10px;
    }

    .card {
      background: white;
      margin: 15px auto;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
      background: #e6f0ff;
    }

    .coming {
      color: gray;
      font-size: 14px;
      margin-top: 5px;
    }

    .active {
      border-left: 5px solid green;
    }

  </style>
</head>

<body>

<h1>Steno Practice Portal</h1>

<div class="container">

  <!-- KC Magazine -->
  <div class="card active" onclick="goToKC()">
    <h3>KC Magazine</h3>
    <p>Practice Dictation</p>
  </div>

  <!-- Progressive -->
  <div class="card">
    <h3>Progressive Magazine</h3>
    <p class="coming">Coming Soon</p>
  </div>

  <!-- Real Exam -->
  <div class="card">
    <h3>Real Exam Dictation</h3>
    <p class="coming">Coming Soon</p>
  </div>

</div>

<script>

function goToKC() {
  // 👉 next page (typing page)
  window.location.href = "test.html";
}

</script>

</body>
</html>
