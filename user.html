<!DOCTYPE html>
<html>
<head>
<title>My Progress</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#0f172a;
  color:white;
}

.top{
  background:#1e293b;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.tabs button{
  margin:5px;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#38bdf8;
}

.box{
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:8px;
}

.record{
  background:white;
  color:black;
  margin:8px 0;
  padding:8px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="top">
  <div id="userInfo">User</div>
</div>

<h2 style="text-align:center;">📊 My Performance</h2>

<div class="tabs" style="text-align:center;">
  <button onclick="filter('all')">Overall</button>
  <button onclick="filter('KC')">KC Magazine</button>
  <button onclick="filter('Progressive')">Progressive</button>
  <button onclick="filter('Exam')">Real Exam</button>
</div>

<div class="box">
  <canvas id="graph"></canvas>
</div>

<div class="box">
  <h3>📄 Last 10 Records</h3>
  <div id="records"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allData = [];
let chart;

// AUTH
onAuthStateChanged(auth, async(user)=>{

  if(!user){
    alert("Please login first");
    return;
  }

  document.getElementById("userInfo").innerText =
    "👤 " + user.displayName;

  const snap = await getDocs(collection(db,"results"));

  allData = [];

  snap.forEach(doc=>{
    let d = doc.data();
    if(d.email === user.email){
      d.error = parseFloat(d.error);
      allData.push(d);
    }
  });

  filter("all");
});

// FILTER
window.filter = function(type){

  let data = allData;

  if(type !== "all"){
    data = allData.filter(d => d.category === type);
  }

  data = data.slice(-10); // last 10

  showGraph(data);
  showRecords(data);
}

// GRAPH
function showGraph(data){

  let labels = data.map((d,i)=>"Test "+(i+1));
  let values = data.map(d=>d.error);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("graph"),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'Error %',
        data:values
      }]
    }
  });
}

// RECORDS
function showRecords(data){

  let html="";

  data.reverse().forEach(d=>{

    html += `
    <div class="record">
      <b>${d.dictationName || "Dictation"}</b><br>
      📂 ${d.category || "General"}<br>
      📊 Error: ${d.error}%<br>
      📝 Words: ${d.totalWords || "-"}<br>
      ⌨ Typed: ${d.typedWords || "-"}<br>
      📅 ${d.date}<br>
      <button onclick="detail()">View Detail</button>
    </div>`;
  });

  document.getElementById("records").innerHTML = html;
}

// DETAIL
window.detail = function(){
  window.location.href = "result.html";
}

</script>

</body>
</html>
