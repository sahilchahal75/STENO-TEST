<!DOCTYPE html>
<html>
<head>
  <title>My Progress</title>

  <style>
    body {
      font-family: Arial;
      background:#f2f2f2;
      padding:10px;
    }

    h2 {
      text-align:center;
    }

    .box {
      background:#fff;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .btn {
      padding:10px;
      border:none;
      border-radius:6px;
      margin-top:10px;
      width:100%;
      cursor:pointer;
    }

    .login-btn {
      background:#007bff;
      color:white;
      font-size:16px;
    }

    .home-btn {
      background:#28a745;
      color:white;
    }
  </style>
</head>

<body>

<h2>📊 My Progress</h2>

<div id="content"></div>

<button class="btn home-btn" onclick="goHome()">🏠 Back to Home</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// 🔐 LOGIN FUNCTION
window.loginUser = function(){
  signInWithPopup(auth, provider)
    .then(()=>{
      location.reload();
    })
    .catch(err=>alert(err.message));
};

// 🧠 USER CHECK
onAuthStateChanged(auth, async (user) => {

  let content = document.getElementById("content");

  // ❌ NOT LOGGED IN
  if(!user){
    content.innerHTML = `
      <div class="box" style="text-align:center;">
        <h3>❌ Please login first</h3>
        <button class="btn login-btn" onclick="loginUser()">
          🔐 Login with Google
        </button>
      </div>
    `;
    return;
  }

  // ✅ LOGGED IN
  let q = query(collection(db, "results"), where("user", "==", user.uid));
  let querySnapshot = await getDocs(q);

  let totalTest = 0;
  let totalError = 0;
  let best = 999;
  let historyHTML = "";

  querySnapshot.forEach((doc) => {
    let d = doc.data();

    totalTest++;
    let err = parseFloat(d.error);

    totalError += err;
    if(err < best) best = err;

    historyHTML += `
      <div style="border-bottom:1px solid #ddd;padding:5px;">
        📅 ${d.date} <br>
        ❌ Error: ${err}%
      </div>
    `;
  });

  let avg = totalTest ? (totalError / totalTest).toFixed(2) : 0;

  content.innerHTML = `
    <div class="box">
      <b>👤 Name:</b> ${user.displayName}
    </div>

    <div class="box">
      <b>Total Tests:</b> ${totalTest}<br>
      <b>Average Error:</b> ${avg}%<br>
      <b>Best Score:</b> ${best==999?0:best}%
    </div>

    <div class="box">
      <b>📜 Test History:</b><br>
      ${historyHTML || "No tests yet"}
    </div>
  `;

});

// BACK
window.goHome = function(){
  window.location.href = "index.html";
};

</script>

</body>
</html>
