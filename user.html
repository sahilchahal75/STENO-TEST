<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background:#f2f2f2;
      padding:10px;
    }

    .box {
      background:#fff;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
    }

    h2 { text-align:center; }

    .btn {
      padding:10px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
      margin-top:10px;
      width:100%;
    }
  </style>
</head>

<body>

<h2>📊 My Progress</h2>

<div class="box" id="userInfo"></div>
<div class="box" id="stats"></div>
<div class="box" id="history"></div>

<button class="btn" onclick="goBack()">⬅ Back to Home</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTnGm3ZR5Zud7ONRxU_ID_vTZokfRif0",
  authDomain: "steno-test-daecc.firebaseapp.com",
  projectId: "steno-test-daecc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if(!user){
    document.body.innerHTML = "❌ Please login first";
    return;
  }

  document.getElementById("userInfo").innerHTML =
    "<b>Name:</b> " + user.displayName;

  let q = query(collection(db, "results"), where("user", "==", user.uid));
  let querySnapshot = await getDocs(q);

  let totalTest = 0;
  let totalError = 0;
  let best = 999;
  let historyHTML = "";

  querySnapshot.forEach((doc) => {
    let d = doc.data();

    totalTest++;
    let err = parseFloat(d.error);

    totalError += err;
    if(err < best) best = err;

    historyHTML += `
      <div style="border-bottom:1px solid #ddd;padding:5px;">
        Error: ${err}% | Date: ${d.date}
      </div>
    `;
  });

  let avg = totalTest ? (totalError / totalTest).toFixed(2) : 0;

  document.getElementById("stats").innerHTML =
    "<b>Total Tests:</b> " + totalTest +
    "<br><b>Average Error:</b> " + avg +
    "<br><b>Best Score:</b> " + (best==999?0:best);

  document.getElementById("history").innerHTML =
    "<b>Test History:</b><br>" + historyHTML;

});

window.goBack = function(){
  window.location.href = "index.html";
};

</script>

</body>
</html>
